<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Benchmark gate for UMLS search iterations</title>
  <desc id="desc">A benchmark gate diagram showing before and after runs, metric checks, and promote or reject decisions.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#102033" flood-opacity="0.14"/>
    </filter>
    <style>
      .bg { fill: #f6f8fb; }
      .panel { fill: #ffffff; stroke: #d7dee8; stroke-width: 2; filter: url(#shadow); }
      .card { fill: #ffffff; stroke: #d7dee8; stroke-width: 2; rx: 18; }
      .title { fill: #17202a; font: 700 30px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #17202a; font: 700 21px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .body { fill: #334155; font: 16px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #5b6673; font: 14px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .axis { stroke: #94a3b8; stroke-width: 2; }
      .grid { stroke: #e2e8f0; stroke-width: 1; }
      .before { fill: #94a3b8; }
      .after { fill: #15803d; }
      .warn { fill: #b7791f; }
      .bad { fill: #b42318; }
      .gate { fill: #eef2ff; stroke: #2457c5; stroke-width: 2; rx: 18; }
      .promote { fill: #e8f7ef; stroke: #15803d; stroke-width: 2; rx: 18; }
      .reject { fill: #fff5df; stroke: #b7791f; stroke-width: 2; rx: 18; }
      .arrow { fill: none; stroke: #334155; stroke-width: 4; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1200" height="720"/>
  <rect class="panel" x="38" y="34" width="1124" height="650" rx="28"/>
  <text class="title" x="86" y="92">Benchmark Gate: Improve Without Breaking Trust</text>
  <text class="small" x="86" y="122">Every promoted change must show measured gain and no unacceptable regression.</text>

  <rect class="card" x="86" y="166" width="438" height="370"/>
  <text class="label" x="122" y="208">Before and after runs</text>
  <line class="axis" x1="142" y1="468" x2="474" y2="468"/>
  <line class="axis" x1="142" y1="246" x2="142" y2="468"/>
  <line class="grid" x1="142" y1="412" x2="474" y2="412"/>
  <line class="grid" x1="142" y1="356" x2="474" y2="356"/>
  <line class="grid" x1="142" y1="300" x2="474" y2="300"/>

  <rect class="before" x="186" y="338" width="38" height="130"/>
  <rect class="after" x="232" y="292" width="38" height="176"/>
  <rect class="before" x="316" y="376" width="38" height="92"/>
  <rect class="after" x="362" y="314" width="38" height="154"/>
  <rect class="bad" x="428" y="436" width="30" height="32"/>

  <text class="small" x="176" y="496">Recall</text>
  <text class="small" x="304" y="496">Source</text>
  <text class="small" x="304" y="516">coverage</text>
  <text class="small" x="418" y="496">Leak</text>
  <rect class="before" x="150" y="548" width="18" height="18"/>
  <text class="small" x="176" y="562">Baseline</text>
  <rect class="after" x="260" y="548" width="18" height="18"/>
  <text class="small" x="286" y="562">Candidate</text>
  <rect class="bad" x="390" y="548" width="18" height="18"/>
  <text class="small" x="416" y="562">Blocking regression</text>

  <path class="arrow" d="M524 348 H626"/>

  <rect class="gate" x="626" y="168" width="240" height="358"/>
  <text class="label" x="660" y="211">Gate checks</text>
  <circle cx="668" cy="252" r="7" fill="#2457c5"/>
  <text class="body" x="686" y="258">Expected identities found</text>
  <circle cx="668" cy="302" r="7" fill="#2457c5"/>
  <text class="body" x="686" y="308">False positives controlled</text>
  <circle cx="668" cy="352" r="7" fill="#2457c5"/>
  <text class="body" x="686" y="358">Assertion status correct</text>
  <circle cx="668" cy="402" r="7" fill="#2457c5"/>
  <text class="body" x="686" y="408">Source policy respected</text>
  <circle cx="668" cy="452" r="7" fill="#2457c5"/>
  <text class="body" x="686" y="458">No release drift surprise</text>
  <text class="small" x="660" y="498">One failed gate sends the</text>
  <text class="small" x="660" y="518">change back for revision.</text>

  <path class="arrow" d="M866 288 H944"/>
  <path class="arrow" d="M866 424 H944"/>

  <rect class="promote" x="944" y="214" width="170" height="112"/>
  <text class="label" x="974" y="258">Promote</text>
  <text class="body" x="974" y="292">Record artifacts</text>
  <text class="body" x="974" y="316">and ship delta.</text>

  <rect class="reject" x="944" y="376" width="170" height="130"/>
  <text class="label" x="974" y="420">Reject</text>
  <text class="body" x="974" y="454">Revert code or</text>
  <text class="body" x="974" y="478">exclude evidence.</text>
  <text class="body" x="974" y="502">Record negative.</text>
</svg>
