<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Search Test Runs</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --panel: #fff;
      --ink: #17202a;
      --muted: #5b6673;
      --line: #d7dee8;
      --good: #166534;
      --good-bg: #ecfdf3;
      --good-line: #bbf7d0;
      --warn: #9a5b05;
      --warn-bg: #fffbeb;
      --warn-line: #fde68a;
      --bad: #b42318;
      --bad-bg: #fef2f2;
      --bad-line: #fecaca;
      --neutral: #475569;
      --neutral-bg: #f8fafc;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.35;
    }
    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }
    .wrap, main {
      width: min(1440px, calc(100vw - 32px));
      margin: 0 auto;
    }
    .topbar {
      align-items: center;
      display: flex;
      gap: 16px;
      justify-content: space-between;
      padding: 18px 0;
    }
    h1 {
      font-size: 24px;
      letter-spacing: 0;
      margin: 0;
    }
    main { padding: 16px 0 42px; }
    a { color: #2457c5; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }
    .nav a, .filter button {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
      min-height: 28px;
      padding: 5px 9px;
    }
    .filter button { cursor: pointer; }
    .filter button.active { border-color: #2457c5; color: #2457c5; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 14px;
      padding: 14px;
    }
    .toolbar {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: space-between;
    }
    .filter {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 720;
    }
    .key {
      align-items: center;
      display: inline-flex;
      gap: 5px;
    }
    .dot {
      border-radius: 999px;
      display: inline-block;
      height: 11px;
      width: 11px;
    }
    .good { background: var(--good-bg); border-color: var(--good-line); color: var(--good); }
    .warn { background: var(--warn-bg); border-color: var(--warn-line); color: var(--warn); }
    .bad { background: var(--bad-bg); border-color: var(--bad-line); color: var(--bad); }
    .neutral { background: var(--neutral-bg); border-color: var(--line); color: var(--neutral); }
    .dot.good { background: #16a34a; }
    .dot.warn { background: #f59e0b; }
    .dot.bad { background: #ef4444; }
    .dot.neutral { background: #94a3b8; }
    .grid {
      display: grid;
      gap: 8px;
    }
    .lane {
      align-items: center;
      display: grid;
      grid-template-columns: minmax(220px, 320px) minmax(0, 1fr);
      gap: 12px;
      min-height: 34px;
    }
    .lane-name {
      color: var(--ink);
      font-size: 13px;
      font-weight: 780;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .lane-dots {
      align-items: center;
      display: flex;
      gap: 5px;
      min-height: 24px;
      overflow-x: auto;
      padding-bottom: 2px;
    }
    .run-dot {
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 4px;
      display: inline-block;
      flex: 0 0 auto;
      height: 18px;
      width: 18px;
    }
    .run-dot.good { background: #22c55e; }
    .run-dot.warn { background: #f59e0b; }
    .run-dot.bad { background: #ef4444; }
    .run-dot.neutral { background: #94a3b8; }
    .table-wrap {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow-x: auto;
    }
    table {
      background: #fff;
      border-collapse: collapse;
      min-width: 960px;
      width: 100%;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
    }
    th {
      background: #f8fafc;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
    }
    tr:last-child td { border-bottom: 0; }
    .status {
      border: 1px solid var(--line);
      border-radius: 999px;
      display: inline-flex;
      font-size: 11px;
      font-weight: 850;
      padding: 3px 8px;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .score {
      font-weight: 780;
      white-space: nowrap;
    }
    .muted { color: var(--muted); }
    code {
      background: #eef2f7;
      border-radius: 4px;
      padding: 1px 4px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
    }
    @media (max-width: 820px) {
      .topbar, .lane { display: block; }
      .nav { justify-content: flex-start; margin-top: 10px; }
      .lane-dots { margin-top: 6px; }
    }
  </style>
</head>

    let activeFilter = "all";

    function fmtTime(value) {
      if (!value) return "";
      return value.replace("T", " ").replace("Z", " UTC");
    }

    function fmtDuration(value) {
      const seconds = Number(value || 0);
      if (!seconds) return "";
      if (seconds >= 60) {
        const minutes = Math.floor(seconds / 60);
        const rest = Math.round(seconds % 60);
        return `${minutes}m ${rest}s`;
      }
      return `${seconds.toFixed(1)}s`;
    }

    function artifactHref(path) {
      if (!path) return "#";
      if (path.startsWith("docs/")) return path.slice(5);
      if (path.startsWith("http://") || path.startsWith("https://")) return path;
      return `../${path}`;
    }

    function esc(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function visibleRuns() {
      return RUNS.filter((run) => activeFilter === "all" || run.status === activeFilter);
    }

    function renderTimeline() {
      const container = document.getElementById("timeline");
      const byTest = new Map();
      for (const run of visibleRuns().slice().reverse()) {
        if (!byTest.has(run.test)) byTest.set(run.test, []);
        byTest.get(run.test).push(run);
      }
      const rows = Array.from(byTest.entries())
        .sort((a, b) => a[0].localeCompare(b[0]))
        .map(([test, runs]) => {
          const dots = runs.map((run) => {
            const title = `${fmtTime(run.time)} | ${run.statusText} | ${run.score} | ${run.detail}`;
            return `<a class="run-dot ${run.status}" href="${artifactHref(run.artifact)}" title="${esc(title)}" aria-label="${esc(title)}"></a>`;
          }).join("");
          return `<div class="lane"><div class="lane-name">${esc(test)}</div><div class="lane-dots">${dots}</div></div>`;
        });
      container.innerHTML = rows.join("") || '<div class="muted">No runs for this filter.</div>';
    }

    function renderTable() {
      const body = document.getElementById("runs");
      body.innerHTML = visibleRuns().map((run) => `
        <tr>
          <td>${fmtTime(run.time)}</td>
          <td>${esc(run.test)}</td>
          <td><span class="status ${run.status}">${esc(run.statusText)}</span></td>
          <td class="score">${esc(run.score || "")}</td>
          <td class="muted">${esc(run.detail || "")}</td>
          <td>${fmtDuration(run.duration)}</td>
          <td><a href="${artifactHref(run.artifact)}"><code>${esc(run.artifact)}</code></a></td>
        </tr>
      `).join("");
    }

    function render() {
      renderTimeline();
      renderTable();
    }

    document.querySelectorAll("[data-filter]").forEach((button) => {
      button.addEventListener("click", () => {
        activeFilter = button.dataset.filter;
        document.querySelectorAll("[data-filter]").forEach((item) => item.classList.remove("active"));
        button.classList.add("active");
        render();
      });
    });

    render();
  </script>
